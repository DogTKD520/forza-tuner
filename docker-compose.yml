services:
  forza-tuner:
    build: .
    container_name: forza-tuner
    restart: unless-stopped

    # Load all config from .env (copy .env.example → .env to get started)
    env_file:
      - .env

    ports:
      - "${PORT:-8001}:8000"
      - "5300:5300/udp"

    volumes:
      # Persist the SQLite database across container restarts
      - forza_data:/app/data

    # Allow the container to reach a local Ollama instance on the host
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  forza_data:
